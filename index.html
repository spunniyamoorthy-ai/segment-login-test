<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Moosend Dummy Implementation</title>
    <!-- Tailwind CSS for styling to match the screenshot -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for the eye icon -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .custom-input {
            background-color: #f3f4f6; /* light gray */
            border: 1px solid transparent;
        }
        .custom-input:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #fff;
        }
        .btn-primary {
            background-color: #3b0799; /* Deep purple */
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #2a0572;
        }
        .btn-google {
            border: 1px solid #4f46e5;
            color: #4f46e5;
        }
        .btn-google:hover {
            background-color: #eff6ff;
        }
    </style>

    <!-- SEGMENT SNIPPET -->
    <script>
      !function(){var i="analytics",analytics=window[i]=window[i]||[];if(!analytics.initialize)if(analytics.invoked)window.console&&console.error&&console.error("Segment snippet included twice.");else{analytics.invoked=!0;analytics.methods=["trackSubmit","trackClick","trackLink","trackForm","pageview","identify","reset","group","track","ready","alias","debug","page","screen","once","off","on","addSourceMiddleware","addIntegrationMiddleware","setAnonymousId","addDestinationMiddleware","register"];analytics.factory=function(e){return function(){if(window[i].initialized)return window[i][e].apply(window[i],arguments);var n=Array.prototype.slice.call(arguments);if(["track","screen","alias","group","page","identify"].indexOf(e)>-1){var c=document.querySelector("link[rel='canonical']");n.push({__t:"bpc",c:c&&c.getAttribute("href")||void 0,p:location.pathname,u:location.href,s:location.search,t:document.title,r:document.referrer})}n.unshift(e);analytics.push(n);return analytics}};for(var n=0;n<analytics.methods.length;n++){var key=analytics.methods[n];analytics[key]=analytics.factory(key)}analytics.load=function(key,n){var t=document.createElement("script");t.type="text/javascript";t.async=!0;t.setAttribute("data-global-segment-analytics-key",i);t.src="https://cdn.segment.com/analytics.js/v1/" + key + "/analytics.min.js";var r=document.getElementsByTagName("script")[0];r.parentNode.insertBefore(t,r);analytics._loadOptions=n};analytics._writeKey="YOUR_WRITE_KEY_HERE";;analytics.SNIPPET_VERSION="5.2.0";
      
      analytics.load("YOUR_WRITE_KEY_HERE"); // <-- REPLACE WITH YOUR TEST WRITE KEY
      
      // =========================================================================
      // NEW: SOURCE MIDDLEWARE FOR BOT FILTERING
      // This runs before any event is sent to Segment.
      // =========================================================================
      analytics.addSourceMiddleware(function({ payload, next }) {
        const userAgent = navigator.userAgent.toLowerCase();
        
        // A list of common bot/scraper signatures
        const bots = [
          'bot', 'crawler', 'spider', 'headlesschrome', 
          'slurp', 'yahoo', 'yandex', 'baiduspider'
        ];
        
        // Check if the user agent contains any of the bot signatures
        const isBot = bots.some(bot => userAgent.includes(bot));

        if (isBot) {
          // It's a bot! We log a warning to the console, and we DO NOT call next(payload).
          // By skipping next(), the event is completely dropped.
          console.warn("🤖 BOT TRAFFIC DETECTED BY MIDDLEWARE. Dropping event:", payload.obj.type);
          return; 
        }

        // It's a real human user. We proceed with sending the event.
        console.log("✅ Human traffic verified by Middleware. Proceeding with event:", payload.obj.type);
        next(payload);
      });
      // =========================================================================

      // Note: analytics.page() is still removed from here to prevent anonymous load events.
      }}();
    </script>
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Toast Notification Container -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex flex-col items-center">
        <span class="font-bold">Login Attempted!</span>
        <span class="text-sm mt-1">Check your browser console.</span>
    </div>

    <div class="w-full max-w-md bg-white p-8 rounded-xl">
        
        <!-- Google Sign-in -->
        <button class="w-full btn-google rounded-full py-3 px-4 font-medium flex justify-center items-center mb-6">
            Sign in with Google
        </button>

        <!-- OR Divider -->
        <div class="flex items-center my-6">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink-0 px-4 text-gray-500 text-sm">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <!-- Form -->
        <form id="login-form">
            <!-- Email -->
            <div class="mb-5">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" class="w-full custom-input rounded-full py-3 px-4 text-sm" placeholder="name@company.com" required>
            </div>

            <!-- Password -->
            <div class="mb-2 relative">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full custom-input rounded-full py-3 px-4 text-sm pr-10" placeholder="••••••••" required>
                <button type="button" class="absolute right-4 top-10 text-gray-400 hover:text-gray-600">
                    <i class="ph ph-eye text-xl"></i>
                </button>
            </div>

            <!-- Forgot Password -->
            <div class="flex justify-end mb-8">
                <a href="#" class="text-xs text-[#3b0799] hover:underline font-medium">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" id="login-btn" class="w-full btn-primary text-white rounded-full py-3 px-4 font-medium text-sm">
                Login
            </button>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = document.getElementById('email').value;
            const fakeUserId = "user_" + btoa(emailInput).substring(0, 10);

            console.log("--- Segment Events Triggered ---");

            // 1. Identify
            analytics.identify(fakeUserId, { email: emailInput });
            
            // 2. Page
            analytics.page('Login Dashboard');
            
            // 3. Track
            analytics.track('User Logged In', { method: 'Email/Password' });

            showToast();
        });

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 4000);
        }
    </script>
</body>
</html>
