<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Moosend Dummy Implementation</title>
    <!-- Tailwind CSS for styling to match the screenshot -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for the eye icon -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            color: #333;
        }
        .custom-input {
            background-color: #f3f4f6; /* light gray */
            border: 1px solid transparent;
        }
        .custom-input:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #fff;
        }
        .btn-primary {
            background-color: #3b0799; /* Deep purple */
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #2a0572;
        }
        .btn-google {
            border: 1px solid #4f46e5;
            color: #4f46e5;
        }
        .btn-google:hover {
            background-color: #eff6ff;
        }
    </style>

    <!--

<body class="bg-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Toast Notification Container -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex flex-col items-center">
        <span class="font-bold">Login Successful!</span>
        <span class="text-sm mt-1">Check the console/Segment Debugger for Identify, Page, and Track events.</span>
    </div>

    <div class="w-full max-w-md bg-white p-8 rounded-xl">
        
        <!-- Google Sign-in -->
        <button class="w-full btn-google rounded-full py-3 px-4 font-medium flex justify-center items-center mb-6">
            Sign in with Google
        </button>

        <!-- OR Divider -->
        <div class="flex items-center my-6">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink-0 px-4 text-gray-500 text-sm">OR</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <!-- Form -->
        <form id="login-form">
            <!-- Email -->
            <div class="mb-5">
                <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
                <input type="email" id="email" class="w-full custom-input rounded-full py-3 px-4 text-sm" placeholder="name@company.com" required>
            </div>

            <!-- Password -->
            <div class="mb-2 relative">
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full custom-input rounded-full py-3 px-4 text-sm pr-10" placeholder="••••••••" required>
                <button type="button" class="absolute right-4 top-10 text-gray-400 hover:text-gray-600">
                    <i class="ph ph-eye text-xl"></i>
                </button>
            </div>

            <!-- Forgot Password -->
            <div class="flex justify-end mb-8">
                <a href="#" class="text-xs text-[#3b0799] hover:underline font-medium">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <button type="submit" id="login-btn" class="w-full btn-primary text-white rounded-full py-3 px-4 font-medium text-sm">
                Login
            </button>
        </form>

        <!-- Footer Links -->
        <div class="mt-8 text-center text-sm">
            <p class="text-gray-600 mb-4">
                Having trouble logging in? <a href="#" class="text-blue-500 hover:underline">Contact us</a>
            </p>
            <p class="text-gray-600">
                Don't have a Moosend account yet? <a href="#" class="text-blue-500 hover:underline">Sign up free</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            // Prevent actual form submission for dummy purposes
            e.preventDefault();

            const emailInput = document.getElementById('email').value;

            // Generate a fake user ID for testing purposes (e.g., hash of email or database ID)
            // In a real app, this comes from the authentication backend response.
            const fakeUserId = "user_" + btoa(emailInput).substring(0, 10);

            console.log("--- Segment Events Firing ---");

            // 1. IDENTIFY the user FIRST
            // This associates the browser with the known user ID.
            analytics.identify(fakeUserId, {
                email: emailInput,
                login_method: 'Email/Password'
            });
            console.log(`1. Called analytics.identify('${fakeUserId}')`);

            // 2. Fire the PAGE call
            // Now that identify has fired, this page call is attached to the known user.
            analytics.page('Login Dashboard', {
                url: window.location.href,
                path: window.location.pathname
            });
            console.log("2. Called analytics.page('Login Dashboard')");

            // 3. Fire a TRACK event (optional but recommended)
            analytics.track('User Logged In', {
                method: 'Email/Password',
                domain: 'identity.moosend.com'
            });
            console.log("3. Called analytics.track('User Logged In')");

            // Show success message
            showToast();
        });

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 4000);
        }
    </script>
</body>
</html>
